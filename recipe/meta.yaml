{% set name = "delayed-assert" %}
{% set version = "0.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/delayed_assert-{{ version }}.tar.gz
  sha256: 3ec7e3ab65ca674c241ebe66510104b318b3688a520d02a9da08a1abfd127d36

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - delayed_assert
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pr4bh4sh/python-delayed-assert
  summary: Delayed/soft assertions for python
  license: Unlicense
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
